        elemento.onerror = function() {
            if (indiceActual < extensiones.length) {

        "Llavero PJSK": { "Mafuyu": 1, "Ena": 1, "Mizuki": 1, "Akito": 1, "Toya": 1, "An": 1, "Kohane": 1, "Airi": 1, "Minori": 1, "Haruka": 1, "Tsukasa": 1, "Emu": 1, "Nene": 1, "Ichika": 1, "Saki": 1, "Honami": 1, "Shiho": 1, "Kanade": 1 },
        "Billetera": { "Kuromi": 1, "Kuromi Púrpura": 1, "Pompompurin": 1, "Cinnamoroll": 1, "My Melody": 1 },
        "Porta photocards": { "Black flower": 2, "White notes": 2, "Kaomoji rosa": 1, "Kaomoji negro": 1 },
        "Llaveros DDLC": { "Monika": 1, "Sayori": 1, "Natsuki": 1, "Yuri": 1 },
        "Figura acrilico DDLC": { "Monika": 1, "Sayori": 1, "Natsuki": 1, "Yuri": 1 },
        "Llaveros TBHK": { "Tsukasa": 1, "Hanako": 1, "Nene": 1, "Kou": 1, "Sakura": 1, "Sosuke": 1, "Tsuchigomori": 1 },
        "Monedero manzana": { "Manzana verde": 1, "Manzana roja": 1 },
        "Cartuchera": { "Gatito": 2, "My Melody": 1 },
        "Llaveros alien stage": { "Hyuna": 1, "Luka": 1, "Ivan": 1, "Till": 1, "Mizi": 1, "Sua": 1 }
    };

    const preciosVariantes = {
        "Cartuchera": { "Gatito": 8000, "My Melody": 10000 }
    };

    let carrito = [];
    let cliente = {};

    function inicializarTienda() {
        const contenedor = document.getElementById("contenedor-productos");
        if(!contenedor) return;
        contenedor.innerHTML = "";

        inventario.forEach(prod => {
            let opcionesVariante = "";
            let selectorModelos = "";
            let elementoImagen = "";

            if (prod.img && prod.img.length > 0) {
                elementoImagen = `<div class="contenedor-imagenes">`;
                prod.img.forEach(src => {
                    let claseImg = prod.img.length > 1 ? "img-producto-doble" : "img-producto";
                    elementoImagen += `<img src="${src}" class="${claseImg}" onload="this.onerror=null;" onerror="intentarCargarImagenProducto(this, '${src}')" alt="">`;
                });
                elementoImagen += `</div>`;
            }

            let precioAMostrar = prod.esPromo ? `Unidad: $${prod.pUnidad} | Pack: $${prod.pPromo}` : `$${prod.precio} c/u`;
            if (prod.usaPrecioVariante) {
                precioAMostrar = "Gatito: $8000 | My Melody: $10000";
            }

            if (prod.esPromo) {
                opcionesVariante = `
                    <div class="control-group">
                        <label>Opción de precio:</label>
                        <select id="sel-tipo-${prod.id}" onchange="cambiarVarianteCantidad(${prod.id})">
                            <option value="unidad">1 unidad ($${prod.pUnidad})</option>
                            <option value="promo">${prod.cPromo} unidades ($${prod.pPromo})</option>
                        </select>
                    </div>
                `;
            }

            if (prod.tieneVariantes) {
                let opcionesHTML = "";
                prod.variantes.forEach(v => {
                    const disp = stockVariantes[prod.nombre][v];
                    if (disp > 0) {
                        opcionesHTML += `<option value="${v}">${v}</option>`;
                    }
                });

                if (opcionesHTML === "") {
                    selectorModelos = `
                        <div class="control-group">
                            <label>Modelo / Variante:</label>
                            <select id="sel-modelo-${prod.id}" disabled><option>Modelos Agotados</option></select>
                        </div>`;
                } else {
                    selectorModelos = `
                        <div class="control-group">
                            <label>Modelo / Variante:</label>
                            <select id="sel-modelo-${prod.id}" onchange="actualizarSelectorCantidad(${prod.id})">${opcionesHTML}</select>
                        </div>`;
                }
            }

            contenedor.innerHTML += `
                <div class="card" data-nombre="${prod.nombre.toLowerCase()}" data-desc="${prod.desc.toLowerCase()}">
                    <div>
                        ${elementoImagen}
                        <h3>${prod.nombre}</h3>
                        <p class="desc-tag">${prod.desc}</p>
                        <p class="precio-tag">${precioAMostrar}</p>
                        <span class="stock-tag">Stock: <span id="stock-val-${prod.id}">${prod.stock}</span> disp.</span>
                    </div>
                    <div class="controles-compra">
                        ${selectorModelos}
                        ${opcionesVariante}
                        <div class="control-group">
                            <label>Cantidad:</label>
                            <select id="sel-cant-${prod.id}"></select>
                        </div>
                        <button id="btn-add-${prod.id}" class="btn-agregar" onclick="agregarProductoAlCarrito(${prod.id})">Agregar (っ•‿•)っ</button>
                    </div>
                </div>
            `;
            actualizarSelectorCantidad(prod.id);
        });
    }

    function filtrarProductos() {
        const textoBusqueda = document.getElementById("input-busqueda").value.toLowerCase().trim();
        const tarjetas = document.querySelectorAll(".productos-grid .card");

        tarjetas.forEach(tarjeta => {
            const nombre = tarjeta.getAttribute("data-nombre");
            const descripcion = tarjeta.getAttribute("data-desc");

            if (nombre.includes(textoBusqueda) || descripcion.includes(textoBusqueda)) {
                tarjeta.style.display = "block";
            } else {
                tarjeta.style.display = "none";
            }
        });
    }

    function actualizarSelectorCantidad(id) {
        const prod = inventario.find(p => p.id === id);
        const selectorCant = document.getElementById(`sel-cant-${id}`);
        const selectorTipo = document.getElementById(`sel-tipo-${id}`);
        const selectorMod = document.getElementById(`sel-modelo-${id}`);
        const btn = document.getElementById(`btn-add-${id}`);
        
        if (!selectorCant) return;
        selectorCant.innerHTML = "";

        let stockDisponible = prod.stock;

        if (prod.tieneVariantes && selectorMod) {
            const modeloSeleccionado = selectorMod.value;
            stockDisponible = stockVariantes[prod.nombre][modeloSeleccionado] || 0;
        }

        if (stockDisponible <= 0 || prod.stock <= 0) {
            selectorCant.innerHTML = '<option value="0">Sin stock (´•__•`)</option>';
            if(btn) btn.disabled = true;
            return;
        }

        if(btn) btn.disabled = false;
        let incremento = 1;
        let maximo = stockDisponible;

        if (selectorTipo && selectorTipo.value === "promo") {
            incremento = prod.cPromo;
            maximo = Math.floor(stockDisponible / prod.cPromo) * prod.cPromo;

            if (maximo === 0) {
                selectorCant.innerHTML = '<option value="0">Falta stock para pack</option>';
                if(btn) btn.disabled = true;
                return;
            }
        }

        for (let i = incremento; i <= maximo; i += incremento) {
            if (selectorTipo && selectorTipo.value === "promo") {
                selectorCant.innerHTML += `<option value="${i}">${i / prod.cPromo} Pack(s) (${i} uds)</option>`;
            } else {
                selectorCant.innerHTML += `<option value="${i}">${i} unidad(es)</option>`;
            }
        }
    }

    function cambiarVarianteCantidad(id) {
        actualizarSelectorCantidad(id);
    }

    function agregarProductoAlCarrito(id) {
        const prod = inventario.find(p => p.id === id);
        const selectorCant = document.getElementById(`sel-cant-${id}`);
        const selectorTipo = document.getElementById(`sel-tipo-${id}`);
        const selectorMod = document.getElementById(`sel-modelo-${id}`);
        const cantidadAComprar = parseInt(selectorCant.value);

        if (cantidadAComprar <= 0 || isNaN(cantidadAComprar)) return;

        let txtNombre = prod.nombre;
        let modeloElegido = "";
        let precioBaseCalculo = prod.precio;

        if (prod.tieneVariantes && selectorMod) {
            modeloElegido = selectorMod.value;
            txtNombre = `${prod.nombre}. ${modeloElegido}`;
            stockVariantes[prod.nombre][modeloElegido] -= cantidadAComprar;
            
            if (prod.usaPrecioVariante) {
                precioBaseCalculo = preciosVariantes[prod.nombre][modeloElegido];
            }
        }

        let costoFinal = 0;
        if (prod.esPromo && selectorTipo && selectorTipo.value === "promo") {
            const packs = cantidadAComprar / prod.cPromo;
            costoFinal = packs * prod.pPromo;
            txtNombre += ` (Pack x${prod.cPromo})`;
        } else if (prod.esPromo) {
            costoFinal = cantidadAComprar * prod.pUnidad;
        } else {
            costoFinal = cantidadAComprar * precioBaseCalculo;
        }

        prod.stock -= cantidadAComprar;

        carrito.push({
            idUnico: Date.now() + Math.random(),
            idProducto: prod.id,
            nombre: txtNombre,
            nombreBase: prod.nombre,
            varianteNombre: modeloElegido,
            canvasCantidad: cantidadAComprar,
            precio: costoFinal
        });

        actualizarVisualCarrito();
        inicializarTienda();
        document.getElementById("input-busqueda").value = ""; 
    }

    function quitarDelCarrito(idUnico, idProducto, cantidad, nombreBase, varianteNombre) {
        const prod = inventario.find(p => p.id === idProducto);
        if (prod) prod.stock += cantidad;

        if (varianteNombre) {
            stockVariantes[nombreBase][varianteNombre] += cantidad;
        }

        carrito = carrito.filter(item => item.idUnico !== idUnico);

        actualizarVisualCarrito();
        inicializarTienda();
    }

    function obtenerTotales() {
        let sumaDinero = 0;
        let sumaUnidades = 0;
        carrito.forEach(item => {
            sumaDinero += item.precio;
            sumaUnidades += item.canvasCantidad;
        });
        return { sumaDinero, sumaUnidades };
    }

    function actualizarVisualCarrito() {
        const contenedor = document.getElementById("lista-carrito");
        const btnComprar = document.getElementById("btn-comprar");
        if(!contenedor) return;
        contenedor.innerHTML = "";

        const { sumaDinero } = obtenerTotales();

        if (carrito.length === 0) {
            contenedor.innerHTML = '<div class="carrito-vacio">El carrito está vacío. 📋</div>';
            if(btnComprar) btnComprar.disabled = true;
            document.getElementById("txt-total").innerText = "0";
            return;
        }

        if(btnComprar) btnComprar.disabled = false;
        carrito.forEach(item => {
            contenedor.innerHTML += `
                <div class="item-carrito">
                    <div class="item-info">
                        <strong>${item.nombre}</strong>
                        <small>Cant: ${item.canvasCantidad} unidades • Subtotal: $${item.precio}</small>
                    </div>
                    <button class="btn-eliminar" onclick="quitarDelCarrito(${item.idUnico}, ${item.idProducto}, ${item.canvasCantidad}, '${item.nombreBase}', '${item.varianteNombre}')">✕</button>
                </div>
            `;
        });

        document.getElementById("txt-total").innerText = sumaDinero;
    }

    function abrirDatosCliente() {
        document.getElementById("modal-datos").style.display = "flex";
    }

    function alternarEnvioOpcion() {
        const metodo = document.getElementById("sel-entrega").value;
        const divDir = document.getElementById("grupo-direccion");
        const inpDir = document.getElementById("inp-direccion");

        if (metodo === "envio") {
            divDir.style.display = "block";
            if(inpDir) inpDir.required = true;
        } else {
            divDir.style.display = "none";
            if(inpDir) {
                inpDir.required = false;
                inpDir.value = "";
            }
        }
    }

    function guardarDatosCliente() {
        cliente = {
            nombre: document.getElementById("inp-nombre").value,
            apellido: document.getElementById("inp-apellido").value,
            telefono: document.getElementById("inp-telefono").value,
            entrega: document.getElementById("sel-entrega").value,
            direccion: document.getElementById("inp-direccion").value || "Punto de encuentro"
        };

        const { sumaDinero } = obtenerTotales();
        const recargoEnvio = cliente.entrega === "envio" ? 2500 : 0;
        
        document.getElementById("txt-monto-final").innerText = sumaDinero + recargoEnvio;
        document.getElementById("modal-datos").style.display = "none";
        document.getElementById("modal-pago").style.display = "flex";
    }

    function alternarInfoPago() {
        const metodoPago = document.getElementById("sel-pago").value;
        const cajaInfo = document.getElementById("caja-info-pago");
        
        if (!metodoPago) {
            cajaInfo.style.display = "none";
            return;
        }
        
        cajaInfo.style.display = "block";
        
        // ALIAS "USACHIS" AGREGADO AUTOMÁTICAMENTE EN LOS MÉTODOS DE RESERVA Y TRANSFERENCIA
        if (metodoPago === "efectivo") {
            cajaInfo.innerHTML = `
                <strong>‹3 Aviso de Reserva Importante:</strong><br>
                En caso de pagar con efectivo deberás abonar al menos el <b>50%</b> del valor total mediante transferencia bancaria.<br><br>
                <b>Datos de Cuenta (Banco Nación):</b><br>
                • Alias: <b>usachis</b><br>
                • A nombre de: <b>Violeta Toconas</b><br><br>
                Una vez hecho el depósito, envía el comprobante al Instagram de la tienda: <b>@usachistresure</b>
            `;
        } else if (metodoPago === "transferencia") {
            cajaInfo.innerHTML = `
                <strong>Datos de Cuenta (Banco Nación):</strong><br>
                • Alias: <b>usachis</b><br>
                • A nombre de: <b>Violeta Toconas</b><br><br>
                ¡Importante! Al finalizar, recordá mandar la captura del comprobante al Instagram de la tienda: <b>@usachistresure</b>
            `;
        }
    }

    function enviarPedidoFinal() {
        const pago = document.getElementById("sel-pago").value;
        if (!pago) {
            alert("Por favor, selecciona un modo de pago.");
            return;
        }

        const btnFinal = document.getElementById("btn-confirmar-final");
        if(btnFinal) {
            btnFinal.disabled = true;
            btnFinal.innerText = "Procesando pedido... (u_u)";
        }

        const { sumaDinero, sumaUnidades } = obtenerTotales();
        const recargoEnvio = cliente.entrega === "envio" ? 2500 : 0;
        const totalNeto = sumaDinero + recargoEnvio;

        let listadoHTML = "<ul style='padding-left: 20px; line-height: 1.6;'>";
        carrito.forEach(item => {
            listadoHTML += `<li><strong>${item.nombre}</strong> — Cantidad: ${item.canvasCantidad} unidades (Subtotal: $${item.precio})</li>`;
        });
        listadoHTML += "</ul>";

        const variablesTemplate = {
            to_email: "violetatoconas10@gmail.com",
            cliente_nombre: `${cliente.nombre} ${cliente.apellido}`,
            cliente_telefono: cliente.telefono,
            metodo_entrega: cliente.entrega === "envio" ? `Envío a domicilio a: ${cliente.direccion}` : "Punto de encuentro",
            metodo_pago: pago === "transferencia" ? "TRANSFERENCIA (BANCO NACIÓN)" : "EFECTIVO",
            productos_detalle: listadoHTML,
            total_productos: sumaUnidades,
            total_dinero: totalNeto
        };

        const SERVICE_ID = "service_c0ss7k9"; 
        const TEMPLATE_ID = "template_392qcwh"; 

        emailjs.send(SERVICE_ID, TEMPLATE_ID, variablesTemplate)
            .then(function(response) {
                alert("¡Muchas gracias por tu compra! (っ•‿•)っ\nPronto nos pondremos en contacto contigo para confirmar el pedido.");
                
                carrito = [];
                actualizarVisualCarrito();
                document.getElementById("modal-pago").style.display = "none";
                document.getElementById("form-datos-cliente").reset();
                document.getElementById("sel-pago").value = "";
                if(btnFinal) {
                    btnFinal.disabled = false;
                    btnFinal.innerText = "Aceptar y Enviar Pedido (っˆڡˆς)";
                }
            }, function(error) {
                console.error("Fallo EmailJS:", error);
                alert("Hubo un error de conexión al intentar enviar el correo. (´•__•`) Por favor intenta de nuevo.");
                if(btnFinal) {
                    btnFinal.disabled = false;
                    btnFinal.innerText = "Aceptar y Enviar Pedido (っˆڡˆς)";
                }
            });
    }

    document.getElementById("form-datos-cliente").addEventListener("submit", function(event) {
        event.preventDefault();
        guardarDatosCliente();
    });

    document.getElementById("input-busqueda").value = "";

    inicializarTienda();
</script>
